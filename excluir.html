<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Excluir Cliente | Cine Atlântida</title>

    <link rel="stylesheet" href="excluir.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

</head>

<body>

    <header>

        <div class="logo">

            <i class="fa-solid fa-film"></i>

            <span>CINE <strong>Atlântida</strong></span>

        </div>

        <nav>

            <a href="index.html">Home</a>

            <a href="listar.html" class="ativo">Consultar Clientes</a>

        </nav>

        <div class="usuario">

            <i class="fa-solid fa-magnifying-glass"></i>

            <i class="fa-regular fa-circle-user"></i>

        </div>

    </header>

    <section class="banner">

        <div class="overlay"></div>

        <div class="texto-banner">

            <p class="caminho">

                <i class="fa-solid fa-house"></i>

                / Clientes / Excluir

            </p>

            <h1>Excluir Cliente</h1>

            <p>

                Confira as informações abaixo antes de
                confirmar a exclusão do cliente.

            </p>

        </div>

    </section>

    <main class="container">

        <form id="formExcluir" class="formulario">

            <div class="grupo">

                <label for="nome">

                    Nome do Cliente

                </label>

                <input type="text" id="nome" disabled>

            </div>

            <div class="grupo">

                <label for="email">

                    E-mail

                </label>

                <input type="email" id="email" disabled>

            </div>

            <div class="grupo">

                <label for="telefone">

                    Telefone

                </label>

                <input type="text" id="telefone" disabled>

            </div>

            <button type="submit" class="excluir">

                <i class="fa-solid fa-trash"></i>

                Confirmar Exclusão

            </button>

        </form>

    </main>

    <footer>
    
        <div class="footer-logo">
    
            <i class="fa-solid fa-film"></i>
    
            <h2>CINE <span>Atlântida</span></h2>
    
        </div>
    
        <p>
    
            © 2026 Cine Atlântida Web
    
        </p>
    
    </footer>
    
    <script src="banco.js"></script>
    
    <script>

        const urlParams = new URLSearchParams(window.location.search);

        const clienteId = parseInt(urlParams.get("id"));

        let lista = obterDados();

        const cliente = lista.find(c => c.id === clienteId);

        if (!cliente) {

            alert("Cliente não encontrado!");

            window.location.href = "listar.html";

        } else {

            document.getElementById("nome").value = cliente.nome;

            document.getElementById("email").value = cliente.email;

            document.getElementById("telefone").value = cliente.telefone;

        }

        document.getElementById("formExcluir").addEventListener("submit", function (e) {

            e.preventDefault();

            const confirmar = confirm("Tem certeza que deseja excluir este cliente?");

            if (confirmar) {

                lista = lista.filter(c => c.id !== clienteId);

                salvarDados(lista);

                alert("Cliente excluído com sucesso!");

                window.location.href = "listar.html";

            }

        });

    </script>
    
    </body>
    
    </html>
