<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Editar Filme | Cine Atlântida</title>

    <link rel="stylesheet" href="editar.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body>  

    <header>

        <div class="logo">

            <i class="fa-solid fa-film"></i>

            <span>CINE <strong>Atlântida</strong></span>

        </div>

        <nav>

            <a href="#">Início</a>
            <a href="#" class="ativo">Filmes</a>
            <a href="#">Programação</a>
            <a href="#">Promoções</a>
            <a href="#">Contato</a>

        </nav>

        <div class="usuario">

            <i class="fa-solid fa-magnifying-glass"></i>
            <i class="fa-regular fa-circle-user"></i>

        </div>

    </header>

    <section class="banner">

        <div class="overlay"></div>

        <div class="texto-banner">

            <p class="caminho">
                <i class="fa-solid fa-house"></i>
                / Filmes / Editar
            </p>

            <h1>Editar Filme</h1>

            <p>
                Atualize as informações do filme cadastrado no sistema.
            </p>

        </div>

    </section>


    <main class="container">

        <form class="formulario">

            <div class="poster">

                <img src="garfield.jpg" alt="Poster">

                <button type="button">
                    <i class="fa-solid fa-image"></i>
                    Alterar Poster
                </button>

            </div>

            <div class="campos">

                <div class="grupo">

                    <label>Título</label>

                    <input type="text" value="Garfield: Fora de casa">

                </div>

                <div class="linha">

                    <div class="grupo">

                        <label>Gênero</label>

                        <select>

                            <option>Ficção Científica </option>
                            <option>Comédia</option>
                            <option>Drama</option>
                            <option>Comédia</option>
                            <option>Terror</option>
                            <option>Infantil</option>

                        </select>

                    </div>

                    <div class="grupo">

                        <label>Duração</label>

                        <input type="text" value="1h4   1min">

                    </div>

                </div>

                <div class="linha">

                    <div class="grupo">

                        <label>Classificação</label>

                        <select>

                            <option>12 anos</option>
                            <option>Livre</option>
                            <option>10 anos</option>
                            <option>14 anos</option>
                            <option>16 anos</option>
                            <option>18 anos</option>

                        </select>

                    </div>

                    <div class="grupo">

                        <label>Data de Estreia</label>

                        <input type="date" value="2022-12-15">

                    </div>

                </div>

                                <div class="linha">
                                
                                    <div class="grupo">
                                
                                        <label>Diretor</label>
                                
                                        <input type="text" value="Mark Dindal">
                                
                                    </div>
                                
                                    <div class="grupo">
                                
                                        <label>Idioma</label>
                                
                                        <input type="text" value="Inglês">
                                
                                    </div>
                                
                                </div>
                                
                                <div class="grupo">
                                
                                    <label>Sinopse</label>
                                
                                    <textarea rows="7">Após um reencontro inesperado de Garfield com o pai há muito perdido, o maltrapilho gato de rua Vic, ele e o amigo canino Odie são forçados a sair de suas vidas perfeitamente mimadas para se juntarem a Vic em um arriscado assalto.
                                                    </textarea>
                                
                                </div>
                                
                                <div class="botoes">
                                
                                    <button type="reset" class="cancelar">
                                
                                        <i class="fa-solid fa-xmark"></i>
                                
                                        Cancelar
                                
                                    </button>
                                
                                    <button type="submit" class="salvar">
                                
                                        <i class="fa-solid fa-floppy-disk"></i>
                                
                                        Salvar Alterações
                                
                                    </button>
                                
                                </div>
                                
                                </div>
                                
                                </form>
                                
                                </main>
                                
                                <footer>
                                
                                    <div class="footer-logo">
                                
                                        <i class="fa-solid fa-film"></i>
                                
                                        <h2>CINE <span>Atlântida</span></h2>
                                
                                    </div>
                                
                                    <p>
                                        © 2026 Cine Atlântida — Sistema de Gerenciamento de Filmes.
                                    </p>
                                
                                </footer>
                                
                                </body>
                                
                                </html>
